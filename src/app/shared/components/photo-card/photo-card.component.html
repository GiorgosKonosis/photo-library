@let currentPhoto = photo();

<button
  type="button"
  class="photo-card"
  (click)="onActivate()"
  [attr.aria-label]="ariaLabel()"
  [attr.aria-pressed]="toggleMode() ? favorite() : null"
>
  <img class="photo-card__img" [src]="currentPhoto.thumbnailUrl" alt="" loading="lazy" />

  @if (favorite()) {
    <span class="photo-card__badge" aria-hidden="true">
      <mat-icon>favorite</mat-icon>
    </span>
  }
</button>
